services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: trimtech
      POSTGRES_PASSWORD: trimtech
      POSTGRES_DB: trimtech
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trimtech"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://trimtech:trimtech@db:5432/trimtech
      SECRET_KEY: ${SECRET_KEY:-troca_em_producao}
      NODE_ENV: development
      PORT: 8080
    ports:
      - "8082:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # durante a build o next precisa saber a url do backend
        NEXT_PUBLIC_API_URL: http://localhost:8082
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8082
      API_INTERNAL_URL: http://backend:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:

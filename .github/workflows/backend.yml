name: pipe back

# seleciona a branch e o diretorio
on:
  push:
    branches: [main]
    paths:
      - "backend/**"

# define o job
jobs:
  check:
    name: build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    # define os steps
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: instala dependencias
        run: npm ci

      - name: gera client prisma
        run: npx prisma generate

      - name: compila
        run: npm run build

      - name: testes
        run: npm run test
